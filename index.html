<!DOCTYPE html>
<html lang="en">
<head>
  <base href="/">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">

  <!-- SEO Meta Tags -->
  <title>Vinita Sharma — Flutter & Cross-Platform Developer</title>
  <meta name="description" content="Portfolio of Vinita Sharma — A passionate Flutter & Cross-Platform Developer crafting high-performance, responsive mobile and web experiences.">
  <meta name="keywords" content="Vinita Sharma, Flutter Developer, Cross-Platform Developer, Flutter Web Specialist, Software Engineer, Portfolio, Dart, Firebase, .NET">
  <meta name="author" content="Vinita Sharma">

  <!-- Open Graph -->
  <meta property="og:title" content="Vinita Sharma — Flutter & Cross-Platform Developer">
  <meta property="og:description" content="Premium portfolio showcasing Flutter, Flutter Web, and cross-platform application development.">
  <meta property="og:type" content="website">

  <!-- iOS meta tags -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Vinita Sharma">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <!-- Preload Critical Scripts for 'Flash' Speed -->
  <link rel="preload" href="flutter_bootstrap.js" as="script">
  <link rel="preload" href="main.dart.js" as="script">

  <!-- Preconnect Google Fonts & CDNs -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://www.gstatic.com" crossorigin>

  <link rel="manifest" href="manifest.json">

  <!-- Premium Loading Styles -->
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #0A0A0F;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      width: 100vw;
    }
    
    /* Background ambient glow effect */
    .bg-glow {
      position: absolute;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(108, 99, 255, 0.08) 0%, rgba(0, 217, 255, 0.03) 50%, rgba(10, 10, 15, 0) 100%);
      filter: blur(80px);
      z-index: 1;
      pointer-events: none;
      animation: pulse 8s ease-in-out infinite alternate;
    }

    .loading-container {
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 2;
      font-family: 'Outfit', 'Inter', sans-serif;
      text-align: center;
    }

    /* Premium dual-ring gradient spinner */
    .spinner-box {
      position: relative;
      width: 80px;
      height: 80px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .spinner-ring {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 3px solid transparent;
      border-top-color: #6C63FF;
      border-bottom-color: #00D9FF;
      animation: spin 1.2s cubic-bezier(0.5, 0, 0.5, 1) infinite;
    }

    .spinner-ring-inner {
      position: absolute;
      width: 70%;
      height: 70%;
      border-radius: 50%;
      border: 2px solid transparent;
      border-left-color: #FF6B6B;
      border-right-color: #00D9FF;
      opacity: 0.8;
      animation: spin-reverse 0.9s linear infinite;
    }

    .loading-text {
      margin-top: 28px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 4px;
      color: #F1F1F3;
      text-transform: uppercase;
      opacity: 0.9;
      animation: fadePulse 1.8s ease-in-out infinite;
      text-shadow: 0 0 10px rgba(108, 99, 255, 0.4);
    }

    .loading-subtext {
      margin-top: 8px;
      font-size: 11px;
      letter-spacing: 2px;
      color: #6B6B80;
      text-transform: uppercase;
      opacity: 0.7;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @keyframes spin-reverse {
      0% { transform: rotate(360deg); }
      100% { transform: rotate(0deg); }
    }

    @keyframes pulse {
      0% { transform: scale(0.9); opacity: 0.7; }
      100% { transform: scale(1.1); opacity: 1.0; }
    }

    @keyframes fadePulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1.0; }
    }
  </style>
</head>
<body>
  <div class="bg-glow"></div>
  <div id="loading" class="loading-container">
    <div class="spinner-box">
      <div class="spinner-ring"></div>
      <div class="spinner-ring-inner"></div>
    </div>
    <div class="loading-text">Vinita Sharma</div>
    <div class="loading-subtext">Initializing Portfolio</div>
  </div>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
